function WBar({ wins, losses, draws }) {
  const t = wins + losses + draws;
  if (!t) return <div className="wbar-empty" />;
  return (
    <div className="wbar">
      <div style={{ width:`${wins/t*100}%`,   background:"#22c55e" }} />
      <div style={{ width:`${draws/t*100}%`,  background:"#f59e0b" }} />
      <div style={{ flex:1, background:"rgba(239,68,68,0.45)" }} />
    </div>
  );
}

function Chip({ label, color }) {
  return <span className="chip" style={{ color, background:`${color}18`, borderColor:`${color}44` }}>{label}</span>;
}

// ResultIcon → icons.js


function StatsPage({ opponents }) {
  const active = [...opponents]
    .filter(o => o.wins + o.losses + o.draws > 0)
    .sort((a, b) => (b.wins/(b.wins+b.losses+b.draws)) - (a.wins/(a.wins+a.losses+a.draws)));
  const tw = opponents.reduce((s,o) => s+o.wins, 0);
  const tl = opponents.reduce((s,o) => s+o.losses, 0);
  const td = opponents.reduce((s,o) => s+o.draws, 0);
  const tt = tw + tl + td;
  const rankColors = ["#22c55e","#aaa","#444"];

  return (
    <div>
      {active.length === 0 && <div className="empty-msg">Registra qualche risultato nel Tracker.</div>}
      {active.map((o, rank) => {
        const t = o.wins + o.losses + o.draws;
        const wp = Math.round(o.wins / t * 100);
        return (
          <div key={o.id} className="stats-row">
            <div className="stats-rank" style={{ color: rankColors[rank] || "#444" }}>#{rank+1}</div>
            <div className="stats-info">
              <div className="stats-combo-row">
                <SysBadge sys={o.system} />
                <span style={{ fontWeight:700, fontSize:12 }}>{comboLabel(o)}</span>
              </div>
              <WBar wins={o.wins} losses={o.losses} draws={o.draws} />
              <div className="chips-row">
                <Chip label={`${o.wins}W`} color="#22c55e" />
                <Chip label={`${o.losses}L`} color="#ef4444" />
                <Chip label={`${o.draws}P`} color="#f59e0b" />
                <span className="match-count">{t} match</span>
              </div>
            </div>
            <div className="stats-wp" style={{ color: wp>=60?"#22c55e":wp>=40?"#f59e0b":"#ef4444" }}>{wp}%</div>
          </div>
        );
      })}
      {tt > 0 && (
        <div className="total-card">
          <div className="total-title">Record Totale</div>
          <div className="total-nums">
            {[["VINTE",tw,"#22c55e"],["PERSE",tl,"#ef4444"],["PARI",td,"#f59e0b"]].map(([l,v,c]) => (
              <div key={l} className="total-num">
                <div className="total-num-val" style={{ color:c }}>{v}</div>
                <div className="total-num-label">{l}</div>
              </div>
            ))}
            <div className="total-wr">
              <div className="total-wr-val">{Math.round(tw/tt*100)}%</div>
              <div className="total-wr-label">WIN RATE</div>
            </div>
          </div>
          <WBar wins={tw} losses={tl} draws={td} />
        </div>
      )}
    </div>
  );
}

function DeckSlot({ combo, deckId, slot, idx, dispatch }) {
  const ok = isComplete(combo);
  const ac = SYS_COL[combo.system] || "#888";
  const [open, setOpen] = useState(false);
  const onChange = (f, v) => dispatch({ type:"DECK_COMBO", deckId, slot, idx, f, v });
  return (
    <div className="deck-combo-slot">
      <div className="deck-combo-slot-header">
        <span className="deck-slot-num">{slot === "main" ? idx+1 : `B${idx+1}`}</span>
        <span className="deck-slot-label" style={{ color: ok ? "#ccc" : "#333" }}>
          {ok ? (
            <span style={{ display:"flex", alignItems:"center", gap:5 }}>
              <SysBadge sys={combo.system} />
              {comboLabel(combo)}
            </span>
          ) : <span style={{ color:"var(--text-ghost)" }}>Non configurata</span>}
        </span>
        <button onClick={() => setOpen(o=>!o)} style={{
          background: open ? `${ac}18` : "rgba(255,255,255,0.03)",
          border: `1px solid ${open ? ac+"44" : "rgba(255,255,255,0.06)"}`,
          color: open ? ac : "#444", borderRadius:5, padding:"2px 8px", fontSize:9, cursor:"pointer", fontWeight:700,
        }}>{open ? "▲" : "▼"}</button>
      </div>
      {open && <ComboForm combo={combo} onChange={onChange} accent={ac} />}
    </div>
  );
}

function DeckCard({ deck, dispatch }) {
  const mainComplete = deck.combos.filter(isComplete).length;
  const bonusComplete = deck.bonus.filter(isComplete).length;
  const total = 3 + deck.bonus.length;
  const done = mainComplete + bonusComplete;
  return (
    <div className="deck-card">
      <div className="deck-header">
        <input
          className="deck-name-input"
          value={deck.name}
          onChange={e => dispatch({ type:"DECK_NAME", id:deck.id, v:e.target.value.slice(0,80) })}
          placeholder="Nome deck..."
        />
        <div style={{ display:"flex", gap:5, alignItems:"center" }}>
          <span style={{ fontSize:10, color: done===total ? "#22c55e" : "#555", fontWeight:700 }}>{done}/{total}</span>
          <button className="deck-del-btn" onClick={() => dispatch({ type:"DECK_DEL", id:deck.id })}>×</button>
        </div>
      </div>

      {/* Completeness pills */}
      <div className="deck-completeness">
        {deck.combos.map((cb, i) => {
          const ok = isComplete(cb);
          return <span key={i} className="deck-pill" style={{
            background: ok ? "rgba(34,197,94,0.1)" : "rgba(255,255,255,0.03)",
            borderColor: ok ? "#22c55e44" : "rgba(255,255,255,0.06)",
            color: ok ? "#22c55e" : "#333",
          }}>{ok ? `✓ C${i+1}` : `C${i+1}`}</span>;
        })}
        {deck.bonus.map((cb, i) => {
          const ok = isComplete(cb);
          return <span key={i} className="deck-pill" style={{
            background: ok ? "rgba(168,85,247,0.1)" : "rgba(255,255,255,0.03)",
            borderColor: ok ? "#a855f744" : "rgba(255,255,255,0.06)",
            color: ok ? "#a855f7" : "#333",
          }}>{ok ? `✓ B${i+1}` : `B${i+1}`}</span>;
        })}
      </div>

      {/* Main combos */}
      <div className="deck-section-label">Combo principali (3)</div>
      <div className="deck-combos">
        {deck.combos.map((cb, i) => (
          <DeckSlot key={i} combo={cb} deckId={deck.id} slot="main" idx={i} dispatch={dispatch} />
        ))}
      </div>

      {/* Bonus combos */}
      <div className="deck-section-label" style={{ display:"flex", alignItems:"center" }}>
        <span style={{ flex:1 }}>Combo bonus</span>
      </div>
      <div className="deck-bonus-controls">
        <span className="deck-bonus-label">Numero combo bonus</span>
        <button className="deck-count-btn" onClick={() => dispatch({ type:"DECK_BONUS_COUNT", id:deck.id, v:deck.bonusCount-1 })}>−</button>
        <span className="deck-count-val">{deck.bonusCount}</span>
        <button className="deck-count-btn" onClick={() => dispatch({ type:"DECK_BONUS_COUNT", id:deck.id, v:deck.bonusCount+1 })}>+</button>
      </div>
      <div className="deck-combos">
        {deck.bonus.map((cb, i) => (
          <DeckSlot key={i} combo={cb} deckId={deck.id} slot="bonus" idx={i} dispatch={dispatch} />
        ))}
      </div>
    </div>
  );
}

function DeckPage({ decks, dispatch }) {
  return (
    <div>
      <div className="section-header">
        <span className="section-title">I Tuoi Deck · {decks.length}</span>
        <button className="add-btn" onClick={() => dispatch({ type:"DECK_ADD" })}>+ Nuovo Deck</button>

}

// ▸ BACKUP  —  BackupPage
// ════════════════════════════════════════════════════════════════
const BACKUP_VERSION = 1;

function BackupPage({ state, dispatch }) {
  const [toast, setToast] = useState(null);
  const fileInputRef = React.useRef(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  };

  const getBackupData = () => ({
    _version: BACKUP_VERSION,
    _app: "BeyTracker X",
    _date: new Date().toISOString(),
    myCombo:    state.myCombo,
    opponents:  state.opponents,
    nextId:     state.nextId,
    decks:      state.decks,
    nextDeckId: state.nextDeckId,
  });

  const handleExport = async () => {
    const data = getBackupData();
    const json = JSON.stringify(data, null, 2);
    const dateStr = new Date().toISOString().slice(0,10);
    const filename = `beytrackerx_backup_${dateStr}.json`;

    // Try Web Share API with file (Android + iOS 15+)
    if (navigator.canShare) {
      const file = new File([json], filename, { type: "application/json" });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            title: "BeyTracker X Backup",
            text: `Backup del ${dateStr}`,
            files: [file],
          });
          showToast("✓ Condiviso!");
          return;
        } catch(e) {
          if (e.name !== "AbortError") console.warn("Share failed:", e);
          else return; // user cancelled
        }
      }
    }
    // Fallback: download
    const blob = new Blob([json], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showToast("✓ File scaricato!");
  };

  const SAFE_KEYS = ["_version","_app","_date","myCombo","opponents","nextId","decks","nextDeckId"];
  const sanitizeCombo = (cb) => {
    if (!cb || typeof cb !== "object") return blankCombo();
    return {
      system:     ["BX","UX","CX"].includes(cb.system) ? cb.system : "BX",
      blade:      typeof cb.blade === "string"      ? cb.blade.slice(0,80)      : "",
      lockChip:   typeof cb.lockChip === "string"   ? cb.lockChip.slice(0,80)   : "",
      mainBlade:  typeof cb.mainBlade === "string"  ? cb.mainBlade.slice(0,80)  : "",
      assistBlade:typeof cb.assistBlade === "string"? cb.assistBlade.slice(0,80): "",
      ratchet:    typeof cb.ratchet === "string"    ? cb.ratchet.slice(0,20)    : "",
      bit:        typeof cb.bit === "string"        ? cb.bit.slice(0,80)        : "",
    };
  };
  const sanitizeOpp = (o) => {
    if (!o || typeof o !== "object") return null;
    return {
      id:      typeof o.id === "number" ? o.id : 0,
      wins:    typeof o.wins === "number"   ? Math.max(0, Math.floor(o.wins))   : 0,
      losses:  typeof o.losses === "number" ? Math.max(0, Math.floor(o.losses)) : 0,
      draws:   typeof o.draws === "number"  ? Math.max(0, Math.floor(o.draws))  : 0,
      history: Array.isArray(o.history) ? o.history.slice(0,200).map(h => ({
        id:     typeof h.id === "number" ? h.id : Date.now(),
        result: ["win","loss","draw"].includes(h.result) ? h.result : "draw",
        finish: typeof h.finish === "string" ? h.finish.slice(0,50) : "",
        ts:     typeof h.ts === "string" ? h.ts.slice(0,10) : "",
      })) : [],
      ...sanitizeCombo(o),
    };
  };
  const sanitizeBackup = (raw) => {
    if (!raw || typeof raw !== "object") throw new Error("Struttura non valida");
    if (raw._app !== "BeyTracker X") throw new Error("File non è un backup BeyTracker X");
    if (raw._version !== 1) throw new Error(`Versione backup non supportata: ${raw._version}`);
    const opps = Array.isArray(raw.opponents) ? raw.opponents.slice(0,100).map(sanitizeOpp).filter(Boolean) : [];
    const decks = Array.isArray(raw.decks) ? raw.decks.slice(0,50).map(dk => {
      if (!dk || typeof dk !== "object") return null;
      return {
        id:         typeof dk.id === "number" ? dk.id : 0,
        name:       typeof dk.name === "string" ? dk.name.slice(0,100) : "Deck",
        bonusCount: typeof dk.bonusCount === "number" ? Math.max(1,Math.min(6,dk.bonusCount)) : 1,
        combos:     Array.isArray(dk.combos) ? dk.combos.slice(0,3).map(sanitizeCombo) : [blankCombo(),blankCombo(),blankCombo()],
        bonus:      Array.isArray(dk.bonus)  ? dk.bonus.slice(0,6).map(sanitizeCombo)  : [blankCombo()],
      };
    }).filter(Boolean) : [];
    return {
      myCombo:    sanitizeCombo(raw.myCombo),
      opponents:  opps,
      nextId:     typeof raw.nextId === "number" ? raw.nextId : opps.length + 1,
      decks,
      nextDeckId: typeof raw.nextDeckId === "number" ? raw.nextDeckId : decks.length + 1,
    };
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast("✗ File troppo grande (max 5MB)"); return; }
    if (!file.name.endsWith(".json")) { showToast("✗ Formato non supportato — usa un file .json"); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const raw = JSON.parse(ev.target.result);
        const data = sanitizeBackup(raw);
        dispatch({ type: "RESTORE", data });
        showToast("✓ Backup ripristinato!");
      } catch(err) {
        showToast(`✗ ${err.message || "File non valido"}`);
      }
    };
    reader.onerror = () => showToast("✗ Errore lettura file");
    reader.readAsText(file);
    e.target.value = "";
  };

  const handleReset = () => {
    if (!confirm("Sei sicuro? Tutti i dati verranno cancellati.")) return;
    dispatch({ type: "FACTORY_RESET" });
    showToast("✓ Reset completato");
  };

  const totalMatches = state.opponents.reduce((s,o) => s + o.wins + o.losses + o.draws, 0);
  const totalDecks   = state.decks.length;
  const totalOpps    = state.opponents.length;

  return (
    <div className="backup-page">
      {/* Stats snapshot */}
      <div className="backup-card">
        <div className="backup-card-title" style={{ color:"#00b4ff" }}>📊 Dati Salvati</div>
        <div style={{ marginTop:8 }}>
          {[
            ["Avversari tracciati", totalOpps],
            ["Match registrati",    totalMatches],
            ["Deck creati",         totalDecks],
            ["Ultimo salvataggio",  (() => { try { const s = localStorage.getItem("beytrackerx_v2"); return s ? new Date(JSON.parse(s)._savedAt||Date.now()).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—"; } catch(_){ return "—"; } })()],
          ].map(([l,v]) => (
            <div key={l} className="backup-stat">
              <span style={{ color:"#666" }}>{l}</span>
              <span className="backup-stat-val">{v}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Export */}
      <div className="backup-card">
        <div className="backup-card-title" style={{ color:"#22c55e" }}>⬆ Esporta Backup</div>
        <div className="backup-card-desc">
          Salva tutti i tuoi dati in un file <strong style={{color:"#aaa"}}>.json</strong>.
          Puoi condividerlo su <strong style={{color:"#aaa"}}>Telegram, WhatsApp, Mail, Google Drive, iCloud</strong> — qualsiasi app del tuo telefono.
        </div>
        <button className="backup-btn export" onClick={handleExport}>
          📤 Esporta e Condividi
        </button>
      </div>

      {/* Import */}
      <div className="backup-card">
        <div className="backup-card-title" style={{ color:"#a855f7" }}>⬇ Ripristina Backup</div>
        <div className="backup-card-desc">
          Seleziona un file <strong style={{color:"#aaa"}}>.json</strong> precedentemente esportato per ripristinare tutti i dati.<br/>
          <span style={{color:"#ef4444", fontSize:10}}>⚠ I dati attuali verranno sostituiti.</span>
        </div>
        <button className="backup-btn import" onClick={() => fileInputRef.current.click()}>
          📥 Seleziona File di Backup
        </button>
        <input
          ref={fileInputRef}
          className="file-input-hidden"
          type="file"
          accept=".json,application/json"
          onChange={handleImport}
        />
      </div>

      {/* Danger zone */}
      <div className="backup-card" style={{ borderColor:"rgba(239,68,68,0.15)" }}>
        <div className="backup-card-title" style={{ color:"#ef4444" }}>⚠ Zona Pericolosa</div>
        <div className="backup-card-desc">
          Cancella tutti i dati e ripristina l'app allo stato iniziale. Operazione irreversibile.
        </div>
        <button className="backup-btn danger" onClick={handleReset}>
          🗑 Reset Completo
        </button>
      </div>

      {toast && <div className="backup-toast">{toast}</div>}
    </div>
  );
}

// ▸ PWA  —  useInstallPrompt
// ════════════════════════════════════════════════════════════════
function useInstallPrompt() {
  const [prompt, setPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  React.useEffect(() => {
    const handler = e => { e.preventDefault(); setPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    window.addEventListener('appinstalled', () => setInstalled(true));
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);
  const install = () => { if (prompt) { prompt.prompt(); prompt.userChoice.then(() => setPrompt(null)); } };
  return { canInstall: !!prompt && !installed, install };
}




// ════════════════════════════════════════════════════════════════
// ▸ DEVICE  —  useDevice, BNAV_TABS
// ════════════════════════════════════════════════════════════════
// BNAV_TABS → icons.js

function useDevice() {
  const [touch, setTouch] = useState(() =>
    typeof window !== "undefined" && window.matchMedia("(pointer: coarse)").matches
  );
  React.useEffect(() => {
    const mq = window.matchMedia("(pointer: coarse)");
    const handler = e => setTouch(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);
  return touch ? "touch" : "desktop";
}

// ▸ TEMA  —  useTheme
// ════════════════════════════════════════════════════════════════
function useTheme() {
  const getTheme = () => {
    const saved = localStorage.getItem('beytrackerx_theme');
    if (saved) return saved;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  };
  const [theme, setTheme] = useState(getTheme);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('beytrackerx_theme', theme);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'light' ? '#f0f2f7' : '#090a0e';
  }, [theme]);

  // Sync with system changes (only if no manual override stored)
  React.useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const handler = e => {
      if (!localStorage.getItem('beytrackerx_theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    };
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  const toggle = () => setTheme(t => {
    const next = t === 'dark' ? 'light' : 'dark';
    localStorage.setItem('beytrackerx_theme', next);
    return next;
  });

  const reset = () => {
    localStorage.removeItem('beytrackerx_theme');
    const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    setTheme(sys);
  };

  return { theme, toggle, reset };
}

          <div style={{fontSize:10,fontWeight:700,color:"#00b4ff",background:"rgba(0,180,255,0.1)",border:"1px solid rgba(0,180,255,0.25)",borderRadius:5,padding:"4px 9px"}}>Installa</div>
        </div>
      )}

      <div className="header">
        <div className="flex-center">
          <div className="logo-spin">⚡</div>
          <div>
            <div className="logo-text">BEY<span style={{ color:"#00b4ff" }}>TRACKER</span><span style={{ color:"#a855f7", fontSize:11 }}> X</span></div>
            <div className="logo-badges">
              {["BX","UX","CX"].map(sys => <span key={sys} className="sys-badge" style={{ color:SYS_COL[sys], borderColor:`${SYS_COL[sys]}44`, background:`${SYS_COL[sys]}14` }}>{sys}</span>)}
            </div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <button onClick={toggleTheme} title={theme === "dark" ? "Passa al tema chiaro" : "Passa al tema scuro"} style={{
            background: "var(--bg-btn-ghost)", border: "1px solid var(--border-btn)",
            borderRadius:6, width:30, height:30, display:"flex", alignItems:"center",
            justifyContent:"center", cursor:"pointer", fontSize:14, flexShrink:0,
            transition:"all 0.2s",
          }}>{theme === "dark" ? "☀️" : "🌙"}</button>
          <div className="nav">
            {["tracker","deck","stats","bits","backup"].map(v => (
              <button key={v} className={`nav-btn ${view===v?"active":"inactive"}`} onClick={() => d({ type:"VIEW", v })}>{v}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Desktop shell: sidebar + main */}
      <div className="desktop-shell">

        {/* Sidebar (desktop only via CSS) */}
        <div className="sidebar">
          <div className="sidebar-nav">
            {["tracker","deck","stats","bits"].map(v => (
              <button key={v} className={`sidebar-btn ${view===v?"active":"inactive"}`} onClick={() => d({ type:"VIEW", v })}>
                <span className="sidebar-icon">{SIDEBAR_ICONS[v]}</span>{v}
              </button>
            ))}
            <div className="sidebar-divider"/>
            <button className={`sidebar-btn ${view==="backup"?"active":"inactive"}`} onClick={() => d({ type:"VIEW", v:"backup" })}>
              <span className="sidebar-icon">💾</span>backup
            </button>
            <div className="sidebar-divider"/>
            <button onClick={toggleTheme} className="sidebar-btn inactive" title="Cambia tema">
              <span className="sidebar-icon">{theme === "dark" ? "☀️" : "🌙"}</span>
              {theme === "dark" ? "tema chiaro" : "tema scuro"}
            </button>
          </div>
        </div>

        {/* Main scrollable area */}
        <div className="desktop-main">
          <div className="content">
        {/* My Combo — shown on touch for all non-deck/bits/backup views,
             hidden on desktop when tracker is active (it's in the left col there) */}
        {view !== "bits" && view !== "deck" && view !== "backup" && view !== "tracker" && (
          <div className="my-combo-card">
            <div className="card-header">
              <div className="card-accent-bar" />
              <span className="card-title">La Tua Combo</span>
              {myOK && <span className="ready-badge">✓ Pronta</span>}
            </div>
            <ComboForm combo={myCombo} onChange={(f,v) => d({ type:"MY", f, v })} />
            {myOK && (
              <div className="combo-label">
                <SysBadge sys={myCombo.system} />
                {comboLabel(myCombo)}
              </div>
            )}
          </div>
        )}
        {/* On touch, show my combo above tracker too */}
        {view === "tracker" && isTouch && (
          <div className="my-combo-card">
            <div className="card-header">
              <div className="card-accent-bar" />
              <span className="card-title">La Tua Combo</span>
              {myOK && <span className="ready-badge">✓ Pronta</span>}
            </div>
            <ComboForm combo={myCombo} onChange={(f,v) => d({ type:"MY", f, v })} />
            {myOK && (
              <div className="combo-label">
                <SysBadge sys={myCombo.system} />
                {comboLabel(myCombo)}
              </div>
            )}
          </div>
        )}

        {/* Tracker */}
        {view === "tracker" && (
          <div className="desktop-tracker-grid">
            <div className="desktop-left-col">
              {/* My Combo shown here on desktop inside grid */}
              {!isTouch && view !== "bits" && view !== "deck" && view !== "backup" && (
                <div className="my-combo-card">
                  <div className="card-header">
                    <div className="card-accent-bar" />
                    <span className="card-title">La Tua Combo</span>
                    {myOK && <span className="ready-badge">✓ Pronta</span>}

                  <ComboForm combo={myCombo} onChange={(f,v) => d({ type:"MY", f, v })} />
                  {myOK && (
                    <div className="combo-label">
                      <SysBadge sys={myCombo.system} />
                      {comboLabel(myCombo)}
                    </div>

            <div className="desktop-right-col">

              <span className="section-title">Avversari · {opponents.length}</span>

                      <div className="opp-label-name" style={{ color: ok?"#ccc":"#333" }}>
                        {ok ? comboLabel(opp) : <span style={{ color:"var(--text-ghost)" }}>Non configurato</span>}
                      </div>
                      {idx < 3 && (
                        <div className="preset-btns">
                          {META_PRESETS.map((p,pi) => (
                            <button key={pi} className="preset-btn" onClick={() => d({ type:"PRESET", id:opp.id, idx:pi })} title={p.label}>M{pi+1}</button>
                          ))}
                        </div>
                      )}
                      <button className="del-btn" onClick={() => d({ type:"DEL", id:opp.id })}>×</button>
                    </div>

                    <ComboForm combo={opp} onChange={(f,v) => d({ type:"OPP", id:opp.id, f, v })} accent={ac} />

                    <div style={{ marginTop:8 }}>
                      <WBar wins={opp.wins} losses={opp.losses} draws={opp.draws} />
                      <div className="chips-row">
                        <Chip label={`${opp.wins}W`} color="#22c55e" />
                        <Chip label={`${opp.losses}L`} color="#ef4444" />
                        <Chip label={`${opp.draws}P`} color="#f59e0b" />
                        {wp !== null
                          ? <span className="wp-display" style={{ color:wp>=50?"#22c55e":"#ef4444" }}>{wp}%</span>
                          : <span style={{ marginLeft:"auto", fontSize:11, color:"var(--text-ghost)" }}>—</span>}
                      </div>
                    </div>

                    <div className="opp-actions">
                      <button
                        className={`register-btn ${myOK&&ok?"enabled":"disabled"}`}
                        disabled={!myOK || !ok}
                        onClick={() => myOK && ok && openLog(opp.id)}

                      <button className="expand-btn" onClick={() => setExp(isE?null:opp.id)} style={{ color:isE?"#00b4ff":"#444" }}>{isE?"▲":"▼"}</button>
                      {tot > 0 && <button className="reset-btn" onClick={() => d({ type:"RESET", id:opp.id })} title="Reset">↺</button>}
                    </div>
                  </div>

                    <div className="history-panel">

                      {opp.history.length === 0

                  )}

            })}
            </div>{/* desktop-right-col */}
          </div>
        )}

        {view === "deck"  && <DeckPage decks={s.decks} dispatch={d} />}
        {view === "stats" && <StatsPage opponents={opponents} />}
        {view === "bits"   && <BitsPage />}

        {BNAV_TABS.map(t => (
          <button key={t.v} className={`bottom-nav-btn ${view===t.v?"active":"inactive"}`} onClick={() => d({ type:"VIEW", v:t.v })}>
            <span className="bnav-icon">{t.icon}</span>

      {/* Log Modal */}
      {log && (() => {
        const opp = opponents.find(o => o.id === log.oppId);
        if (!opp) return null;
        const tot = opp.wins + opp.losses + opp.draws;
        const lastResult = opp.history[0];
        return (
          <div className="modal-overlay" onClick={() => setLog(null)}>
            <div className="modal-sheet" onClick={e => e.stopPropagation()}>

              </div>
              <div className="modal-vs">{comboLabel(opp)}</div>
              <div style={{ display:"flex", gap:8, marginBottom:11, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"7px 10px", alignItems:"center" }}>
                <Chip label={`${opp.wins}W`} color="#22c55e" />
                <Chip label={`${opp.losses}L`} color="#ef4444" />
                <Chip label={`${opp.draws}P`} color="#f59e0b" />
                <span style={{ color:"#3a3a3a", fontSize:10 }}>{tot} match</span>
                {lastResult && <span style={{ marginLeft:"auto", fontSize:10, color:"#444" }}>Ultimo: <ResultIcon result={lastResult.result} /></span>}
              </div>
              <div className="modal-finish-label">Tipo di fine</div>
              <div className="modal-finish-btns">
                {FINISH_TYPES.map(f => (
                  <button key={f} className="finish-btn" onClick={() => setFin(f)} style={{
                    background: fin===f ? "rgba(0,180,255,0.12)" : "rgba(255,255,255,0.03)",
                    borderColor: fin===f ? "#00b4ff44" : "rgba(255,255,255,0.06)",
                    color: fin===f ? "#00b4ff" : "#555",
                  }}>{f}</button>
                ))}
              </div>
              <div className="result-btns">
                {[["▲ WIN","win","#22c55e"],["= PARI","draw","#f59e0b"],["▼ LOSS","loss","#ef4444"]].map(([label,r,color]) => (
                  <button key={r} className="result-btn" onClick={() => d({ type:"LOG", oppId:opp.id, r, finish:fin })}
                    style={{ background:`${color}10`, borderColor:`${color}44`, color }}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}
