<body>

<script type="text/babel">
const { useState, useReducer, useEffect, useCallback, useMemo } = React;

// Sovrascrive BNAV_TABS di icons.js aggiungendo il tab BattlePass
var BNAV_TABS = [
  { v: "tracker", icon: "⚔",  label: "Tracker" },
  { v: "deck",    icon: "🃏", label: "Deck"    },
  { v: "stats",   icon: "📊", label: "Stats"   },
  { v: "bits",    icon: "🔩", label: "Bits"    },
  { v: "bp",      icon: "📡", label: "Pass"    },
  { v: "backup",  icon: "💾", label: "Backup"  },
];

/* ─── HELPERS ───────────────────────────────────────────────── */
const comboLabel = c => {
  if (!c) return "—";
  if (c.system === "CX")
    return (c.lockChip && c.mainBlade && c.assistBlade && c.ratchet && c.bit)
      ? `${c.lockChip} ${c.mainBlade} / ${c.assistBlade} ${c.ratchet} ${c.bit}` : "CX incompleta";
  return (c.blade && c.ratchet && c.bit) ? `${c.blade} ${c.ratchet} ${c.bit}` : "—";
};
const isComplete = c => {
  if (!c) return false;
  if (c.system === "CX") return !!(c.lockChip && c.mainBlade && c.assistBlade && c.ratchet && c.bit);
  return !!(c.blade && c.ratchet && c.bit);
};
const blankCombo  = () => ({ system:"BX", blade:"", lockChip:"", mainBlade:"", assistBlade:"", ratchet:"", bit:"" });
const makeOpp     = (id) => ({ id, ...blankCombo() });
const blankDeck   = (id) => ({ id, name:`Deck ${id}`, slots:[blankCombo(), blankCombo(), blankCombo()], bonus:0 });

function mergeMyRecord(records, combo, result, finish, oppLabel) {
  const label = comboLabel(combo);
  const entry = { id:Date.now(), result, finish:finish||"", opp:oppLabel, ts:new Date().toLocaleTimeString() };
  const idx   = records.findIndex(r => r.label === label);
  if (idx >= 0) {
    return records.map((r,i) => i !== idx ? r : {
      ...r,
      wins:    r.wins    + (result==='win'  ? 1 : 0),
      losses:  r.losses  + (result==='loss' ? 1 : 0),
      draws:   r.draws   + (result==='draw' ? 1 : 0),
      history: [entry, ...r.history],
    });
  }
  return [...records, {
    label, combo:{...combo},
    wins:   result==='win'  ? 1 : 0,
    losses: result==='loss' ? 1 : 0,
    draws:  result==='draw' ? 1 : 0,
    history:[entry],
  }];
}

const STORAGE_KEY = "beytrackerx_v4";

const INIT_STATE = {
  myCombo:    blankCombo(),
  opponents:  [makeOpp(1)],
  nextId:     2,
  view:       "tracker",
  decks:      [],
  nextDeckId: 1,
  myRecords:  [],
};

/* ─── REDUCER ───────────────────────────────────────────────── */
function reducer(s, a) {
  let next;
  switch (a.type) {
    case "MY":
      next = { ...s, myCombo: { ...s.myCombo, [a.f]: a.v } }; break;
    case "OPP":
      next = { ...s, opponents: s.opponents.map(o => o.id===a.id ? { ...o, [a.f]:a.v } : o) }; break;
    case "ADD_OPP":
      next = { ...s, opponents: [...s.opponents, makeOpp(s.nextId)], nextId:s.nextId+1 }; break;
    case "ADD_OPP_META": {
      // a.preset = { system, blade, ratchet, bit }
      const p = a.preset;
      const newOpp = { ...makeOpp(s.nextId), system:p.system, blade:p.blade, ratchet:p.ratchet, bit:p.bit };
      next = { ...s, opponents: [...s.opponents, newOpp], nextId:s.nextId+1 };
      break;
    }
    case "DEL_OPP":
      next = { ...s, opponents: s.opponents.filter(o => o.id !== a.id) }; break;
    case "LOG": {
      const opp = s.opponents.find(o => o.id === a.oppId);
      next = { ...s, myRecords: mergeMyRecord(s.myRecords||[], s.myCombo, a.r, a.finish, comboLabel(opp)) };
      break;
    }
    case "DEL_RECORD":
      next = { ...s, myRecords: (s.myRecords||[]).filter(r => r.label !== a.label) }; break;
    case "ADD_DECK":
      next = { ...s, decks:[...s.decks, blankDeck(s.nextDeckId)], nextDeckId:s.nextDeckId+1 }; break;
    case "DEL_DECK":
      next = { ...s, decks:s.decks.filter(d => d.id !== a.id) }; break;
    case "DECK_NAME":
      next = { ...s, decks:s.decks.map(d => d.id===a.id ? {...d, name:a.v} : d) }; break;
    case "DECK_SLOT":
      next = { ...s, decks:s.decks.map(d => d.id===a.id ? {
        ...d, slots:d.slots.map((sl,i) => i===a.idx ? {...sl, [a.f]:a.v} : sl)
      } : d) }; break;
    case "DECK_BONUS":
      next = { ...s, decks:s.decks.map(d => d.id===a.id ? {...d, bonus:Math.max(0,d.bonus+a.delta)} : d) }; break;
    case "VIEW":
      next = { ...s, view:a.v }; break;
    case "RESTORE":
      next = { ...INIT_STATE, ...a.data }; break;
    case "FACTORY_RESET":
      next = { ...INIT_STATE }; break;
    default: return s;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  return next;
}

/* ─── UI BASE ───────────────────────────────────────────────── */
function Sel({ val, onChange, opts, ph, accent }) {
  return (
    <select value={val} onChange={e => onChange(e.target.value)}
      style={{ background:"var(--bg-select)", color:"var(--text-primary)",
               border:`1px solid ${accent||'var(--border-select)'}`,
               borderRadius:6, padding:6, flex:1, fontSize:12 }}>
      <option value="">{ph}</option>
      {opts.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

/* ─── RADAR CHART ───────────────────────────────────────────── */
function RadarChart({ stats, color, size }) {
  size = size || 180;
  if (!stats) return null;
  const axes = [
    {key:'attack', label:'ATK'},
    {key:'stamina',label:'STA'},
    {key:'defense',label:'DEF'},
    {key:'burst',  label:'BST'},
    {key:'speed',  label:'SPD'},
  ];
  const n=axes.length, cx=size/2, cy=size/2, r=size*0.34;
  const angle = i => (Math.PI*2*i/n) - Math.PI/2;
  const pt = (i,pct) => {
    const a = angle(i);
    return [cx + Math.cos(a)*r*pct, cy + Math.sin(a)*r*pct];
  };
  const col = color || '#00b4ff';
  const dataPts = axes.map((ax,i) => pt(i, Math.max(0.04, (stats[ax.key]||0)/100)));
  return (
    <svg width={size} height={size} style={{overflow:'visible',display:'block',margin:'0 auto'}}>
      {/* grid */}
      {[0.25,0.5,0.75,1.0].map(lvl => (
        <polygon key={lvl}
          points={axes.map((_,i) => pt(i,lvl).join(',')).join(' ')}
          fill="none" stroke="var(--border-card)" strokeWidth={lvl===1?1.5:1} opacity={lvl===1?0.5:0.3}/>
      ))}
      {/* axis lines */}
      {axes.map((_,i) => { const [x,y]=pt(i,1); return (
        <line key={i} x1={cx} y1={cy} x2={x} y2={y}
          stroke="var(--border-card)" strokeWidth="1" opacity="0.4"/>
      );})}
      {/* data polygon */}
      <polygon points={dataPts.map(p=>p.join(',')).join(' ')}
        fill={`${col}2a`} stroke={col} strokeWidth="2" strokeLinejoin="round"/>
      {/* dots */}
      {dataPts.map(([x,y],i) => <circle key={i} cx={x} cy={y} r="3.5" fill={col}/>)}
      {/* labels */}
      {axes.map((ax,i) => {
        const [x,y] = pt(i,1.30);
        const val = stats[ax.key]||0;
        return (
          <g key={ax.key}>
            <text x={x} y={y-1} textAnchor="middle" dominantBaseline="middle"
              fontSize="9" fontWeight="700" fill="var(--text-dimmer)">{ax.label}</text>
            <text x={x} y={y+11} textAnchor="middle" dominantBaseline="middle"
              fontSize="11" fontWeight="900" fill={col}>{val}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ─── COMBO STATS CARD ──────────────────────────────────────── */
function ComboStatsCard({ combo }) {
  const stats = calcComboStats(combo);
  if (!stats) return null;
  const ac = SYS_COL[combo.system]||'#00b4ff';
  const dominant = Object.entries({attack:stats.attack,defense:stats.defense,stamina:stats.stamina})
    .sort((a,b)=>b[1]-a[1])[0][0];
  const tCol = {attack:'#ef4444',defense:'#3b82f6',stamina:'#22c55e'}[dominant];
  const tLbl = {attack:'Attacco',defense:'Difesa',stamina:'Stamina'}[dominant];
  return (
    <div style={{background:'var(--bg-card2)',border:`1px solid ${ac}33`,
                 borderRadius:10,padding:'12px 8px 8px',marginTop:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <span style={{fontSize:10,fontWeight:800,textTransform:'uppercase',
                      letterSpacing:'1px',color:'var(--text-dimmer)'}}>Statistiche Combo</span>
        <span style={{marginLeft:'auto',fontSize:10,fontWeight:800,color:tCol,
                      background:`${tCol}18`,border:`1px solid ${tCol}44`,
                      borderRadius:4,padding:'1px 7px'}}>{tLbl}</span>
      </div>
      <RadarChart stats={stats} color={ac} size={160}/>
    </div>
  );
}

/* ─── META PRESETS PANEL ────────────────────────────────────── */
function MetaPresetsPanel({ onApply }) {
  const [roleFilter, setRoleFilter] = useState("All");
  const [sysFilter,  setSysFilter]  = useState("All");
  const roles = ["All","Attack","Stamina","Defense","Spin-Eq","Balance"];
  const syss  = ["All","BX","UX","CX"];
  const filtered = META_PRESETS.filter(p =>
    (roleFilter==="All"||p.role===roleFilter) &&
    (sysFilter==="All"||p.system===sysFilter)
  );
  return (
    <div style={{marginTop:14}}>
      <div className="section-header" style={{marginBottom:8}}>
        <span className="section-title">Meta Presets · WBO 2025</span>
      </div>
      <div style={{display:'flex',gap:3,flexWrap:'wrap',marginBottom:8}}>
        {roles.map(r => (
          <button key={r} onClick={()=>setRoleFilter(r)} style={{
            background: roleFilter===r?`${ROLE_COL[r]||'#00b4ff'}20`:'var(--bg-btn-ghost)',
            border:`1px solid ${roleFilter===r?(ROLE_COL[r]||'#00b4ff'):'var(--border-btn)'}`,
            color: roleFilter===r?(ROLE_COL[r]||'#00b4ff'):'var(--text-dimmer)',
            borderRadius:5,padding:'3px 8px',fontSize:10,fontWeight:700,cursor:'pointer',
          }}>{r}</button>
        ))}
        {syss.map(sy => (
          <button key={sy} onClick={()=>setSysFilter(sy)} style={{
            background: sysFilter===sy?`${SYS_COL[sy]||'#00b4ff'}20`:'var(--bg-btn-ghost)',
            border:`1px solid ${sysFilter===sy?(SYS_COL[sy]||'var(--border-btn)'):'var(--border-btn)'}`,
            color: sysFilter===sy?(SYS_COL[sy]||'#00b4ff'):'var(--text-dimmer)',
            borderRadius:5,padding:'3px 8px',fontSize:10,fontWeight:700,cursor:'pointer',
          }}>{sy}</button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        {filtered.map(p => (
          <div key={p.label}
            style={{display:'flex',alignItems:'center',gap:6,padding:'7px 10px',
                    background:'var(--bg-card)',border:'1px solid var(--border-card)',
                    borderRadius:8,cursor:'pointer'}}
            onClick={()=>onApply(p)}>
            <span style={{fontSize:9,fontWeight:800,minWidth:14,textAlign:'center',
              color:TIER_COL[p.tier],background:`${TIER_COL[p.tier]}18`,
              border:`1px solid ${TIER_COL[p.tier]}44`,borderRadius:3,padding:'1px 4px'}}>{p.tier}</span>
            <span style={{fontSize:9,fontWeight:700,minWidth:50,textAlign:'center',
              color:ROLE_COL[p.role]||'#888',background:`${ROLE_COL[p.role]||'#888'}11`,
              border:`1px solid ${ROLE_COL[p.role]||'#888'}33`,borderRadius:3,padding:'1px 4px'}}>{p.role}</span>
            <span style={{fontSize:9,fontWeight:700,color:SYS_COL[p.system],
              background:`${SYS_COL[p.system]}18`,border:`1px solid ${SYS_COL[p.system]}44`,
              borderRadius:3,padding:'1px 5px'}}>{p.system}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:800,color:'var(--text-card)',
                           overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label}</div>
              {p.note && <div style={{fontSize:9,color:'var(--text-ultra)',marginTop:1}}>{p.note}</div>}
            </div>
            <span style={{fontSize:12,color:'var(--text-ghost)',flexShrink:0}}>→</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── COMBO FORM ────────────────────────────────────────────── */
function ComboForm({ combo, onChange, showStats, showPresets, onPresetApply }) {
  const ac     = SYS_COL[combo.system];
  const blades = combo.system==="UX" ? UX_BLADES : combo.system==="CX" ? CX_BLADES : BX_BLADES;
  return (
    <div className="combo-form">
      <div className="sys-toggle">
        {["BX","UX","CX"].map(sys => (
          <button key={sys} onClick={() => onChange("system",sys)} className="sys-btn"
            style={{ background:combo.system===sys ? SYS_COL[sys] : 'transparent',
                     color:combo.system===sys ? '#fff' : 'var(--text-dimmer)',
                     borderColor:SYS_COL[sys] }}>
            {sys}
          </button>
        ))}
      </div>
      <div className="row2">
        <Sel val={combo.blade}   onChange={v => onChange("blade",v)}   opts={blades}   ph="Blade"   accent={ac}/>
        <Sel val={combo.ratchet} onChange={v => onChange("ratchet",v)} opts={RATCHETS} ph="Ratchet" accent={ac}/>
      </div>
      <Sel val={combo.bit} onChange={v => onChange("bit",v)} opts={BIT_NAMES} ph="Bit" accent={ac}/>
      {showStats && <ComboStatsCard combo={combo}/>}
      {showPresets && onPresetApply && <MetaPresetsPanel onApply={onPresetApply}/>}
    </div>
  );
}

/* ─── LOG MODAL ─────────────────────────────────────────────── */
function LogModal({ myCombo, opp, onLog, onClose }) {
  const [finish, setFinish] = useState("");
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-subtitle">La tua combo</div>
        <div className="modal-vs">{comboLabel(myCombo)}</div>
        <div className="modal-subtitle">vs avversario</div>
        <div className="modal-vs" style={{marginBottom:14}}>{comboLabel(opp)}</div>
        <div className="modal-finish-label">Tipo di fine</div>
        <div className="modal-finish-btns">
          {FINISH_TYPES.map(f => (
            <button key={f} className="finish-btn"
              style={{ background:finish===f?'rgba(0,180,255,0.15)':'var(--bg-btn-ghost)',
                       borderColor:finish===f?'#00b4ff':'var(--border-btn)',
                       color:finish===f?'#00b4ff':'var(--text-secondary)' }}
              onClick={() => setFinish(f)}>{f}</button>
          ))}
        </div>
        <div className="result-btns">
          {[['win','VITTORIA','#22c55e'],['draw','PAREGGIO','#f59e0b'],['loss','SCONFITTA','#ef4444']].map(([r,label,col]) => (
            <button key={r} className="result-btn"
              style={{ background:`${col}14`, borderColor:col, color:col }}
              onClick={() => { onLog(r,finish); onClose(); }}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── STATS VIEW ────────────────────────────────────────────── */
function StatsView({ myRecords, onDelRecord }) {
  const [selected, setSelected] = useState(null);
  const records = myRecords || [];

  if (records.length === 0)
    return <div className="empty-msg">Nessuna partita registrata.<br/>Vai nel Tracker e logga qualche match!</div>;

  if (selected) {
    const rec = records.find(r => r.label === selected);
    if (!rec) { setSelected(null); return null; }
    const total = rec.wins+rec.losses+rec.draws;
    const wr    = total > 0 ? Math.round(rec.wins/total*100) : 0;

    // Raggruppa per avversario
    const byOpp = {};
    rec.history.forEach(h => {
      const k = h.opp||"—";
      if (!byOpp[k]) byOpp[k] = { opp:k, wins:0, losses:0, draws:0, matches:[] };
      byOpp[k][h.result==='win'?'wins':h.result==='loss'?'losses':'draws']++;
      byOpp[k].matches.push(h);
    });

    return (
      <div>
        <button className="back-btn" onClick={() => setSelected(null)}>← Tutte le combo</button>
        <div className="my-combo-card" style={{marginTop:10}}>
          <div className="card-header">
            <div className="card-accent-bar"/>
            <span className="card-title" style={{fontSize:11}}>{rec.label}</span>
          </div>
          <div className="total-card">
            <div className="total-nums">
              <div className="total-num"><div className="total-num-val" style={{color:'#22c55e'}}>{rec.wins}</div><div className="total-num-label">VINTE</div></div>
              <div className="total-num"><div className="total-num-val" style={{color:'#ef4444'}}>{rec.losses}</div><div className="total-num-label">PERSE</div></div>
              <div className="total-num"><div className="total-num-val" style={{color:'#f59e0b'}}>{rec.draws}</div><div className="total-num-label">PARI</div></div>
              <div className="total-wr"><div className="total-wr-val">{wr}%</div><div className="total-wr-label">WIN RATE</div></div>
            </div>
          </div>
        </div>

        <div className="section-header" style={{marginTop:16}}>
          <span className="section-title">Match per avversario</span>
        </div>
        {Object.values(byOpp).map(g => {
          const gt = g.wins+g.losses+g.draws;
          return (
            <div key={g.opp} className="stats-row" style={{flexDirection:'column',alignItems:'flex-start',gap:6}}>
              <div style={{display:'flex',width:'100%',alignItems:'center',gap:8}}>
                <span style={{flex:1,fontSize:12,fontWeight:800,color:'var(--text-card)'}}>{g.opp}</span>
                <span style={{fontSize:11,color:'#22c55e'}}>{g.wins}V</span>
                <span style={{fontSize:11,color:'#ef4444'}}>{g.losses}P</span>
                <span style={{fontSize:11,color:'#f59e0b'}}>{g.draws}=</span>
                <span className="match-count">{gt} match</span>
              </div>
              {g.matches.map(h => (
                <div key={h.id} style={{display:'flex',gap:8,width:'100%',paddingLeft:6,borderLeft:'2px solid var(--border-card3)'}}>
                  <span style={{fontSize:10,fontWeight:800,minWidth:48,
                    color:h.result==='win'?'#22c55e':h.result==='loss'?'#ef4444':'#f59e0b'}}>
                    {h.result==='win'?'VINTA':h.result==='loss'?'PERSA':'PARI'}
                  </span>
                  <span style={{fontSize:10,color:'var(--text-dimmer)',flex:1}}>{h.finish||'—'}</span>
                  <span style={{fontSize:10,color:'var(--text-ultra)'}}>{h.ts}</span>
                </div>
              ))}
            </div>
          );
        })}

        <button className="backup-btn danger" style={{marginTop:16}}
          onClick={() => { if(confirm('Eliminare questa combo e tutti i suoi dati?')) { onDelRecord(rec.label); setSelected(null); }}}>
          🗑 Elimina questa combo
        </button>
      </div>
    );
  }

  const sorted = [...records].sort((a,b) => {
    const ta=a.wins+a.losses+a.draws, tb=b.wins+b.losses+b.draws;
    return (tb>0?b.wins/tb:0) - (ta>0?a.wins/ta:0);
  });
  const totalW=records.reduce((s,r)=>s+r.wins,0), totalL=records.reduce((s,r)=>s+r.losses,0), totalD=records.reduce((s,r)=>s+r.draws,0);
  const totalM=totalW+totalL+totalD;

  return (
    <div>
      <div className="total-card" style={{marginBottom:14}}>
        <div className="total-title">Riepilogo globale · {records.length} combo</div>
        <div className="total-nums">
          <div className="total-num"><div className="total-num-val" style={{color:'#22c55e'}}>{totalW}</div><div className="total-num-label">VINTE</div></div>
          <div className="total-num"><div className="total-num-val" style={{color:'#ef4444'}}>{totalL}</div><div className="total-num-label">PERSE</div></div>
          <div className="total-num"><div className="total-num-val" style={{color:'#f59e0b'}}>{totalD}</div><div className="total-num-label">PARI</div></div>
          <div className="total-wr"><div className="total-wr-val">{totalM>0?Math.round(totalW/totalM*100):0}%</div><div className="total-wr-label">WIN RATE</div></div>
        </div>
      </div>
      <div className="bits-db-title">Le tue combo testate</div>
      {sorted.map((rec,i) => {
        const total=rec.wins+rec.losses+rec.draws;
        const wr=total>0?Math.round(rec.wins/total*100):0;
        return (
          <div key={rec.label} className="stats-row" style={{cursor:'pointer'}} onClick={()=>setSelected(rec.label)}>

/* ─── BATTLEPASS VIEW ───────────────────────────────────────── */
const BP_SERVICE   = "55c40000-f8eb-11ec-b939-0242ac120002";
const BP_CMD_CHAR  = "55c4f001-f8eb-11ec-b939-0242ac120002"; // WRITE NO RESPONSE
const BP_DATA_CHAR = "55c4f002-f8eb-11ec-b939-0242ac120002"; // NOTIFY, READ

function parseRPM(dataView) {
  // Payload: array of bytes from BEYLOGGER3
  // Try little-endian uint16 at offset 0 and 2, pick the non-zero plausible value (2000-50000 RPM)
  if (!dataView || dataView.byteLength < 2) return null;
  const candidates = [];
  for (let i = 0; i <= dataView.byteLength - 2; i += 2) {
    const v = dataView.getUint16(i, true);
    if (v >= 1000 && v <= 60000) candidates.push(v);
  }
  if (candidates.length === 0) return null;
  // Take the highest plausible value (RPM is typically the largest meaningful number)
  return Math.max(...candidates);
}

function rpmRating(rpm) {
  if (!rpm) return { label: "—", color: "#666" };
  if (rpm >= 30000) return { label: "🔥 Eccellente", color: "#f59e0b" };
  if (rpm >= 22000) return { label: "⚡ Ottimo",     color: "#22c55e" };
  if (rpm >= 15000) return { label: "👍 Buono",      color: "#00b4ff" };
  if (rpm >= 8000)  return { label: "😐 Nella media",color: "#a855f7" };
  return                    { label: "📉 Basso",      color: "#ef4444" };
}

function BattlePassView({ myCombo, decks }) {
  const [bleState, setBleState] = useState("idle"); // idle | scanning | connected | error | unsupported
  const [errMsg,   setErrMsg]   = useState("");
  const [lastRPM,  setLastRPM]  = useState(null);
  const [launches, setLaunches] = useState([]); // [{rpm, ts, comboLabel}]
  const [device,   setDevice]   = useState(null);
  const [activeComboSrc, setActiveComboSrc] = useState("tracker"); // "tracker" | deck id
  const charRef = React.useRef(null);

  // Combo attiva selezionata
  const activeCombo = useMemo(() => {
    if (activeComboSrc === "tracker") return myCombo;
    const dk = (decks||[]).find(d => String(d.id) === String(activeComboSrc));
    if (!dk) return myCombo;
    // Prima slot completa del deck
    return dk.slots.find(isComplete) || myCombo;
  }, [activeComboSrc, myCombo, decks]);

  const comboName = isComplete(activeCombo) ? comboLabel(activeCombo) : "Nessuna combo attiva";
  const acColor   = SYS_COL[activeCombo?.system] || "#00b4ff";

  const disconnect = useCallback(() => {
    if (charRef.current) {
      try { charRef.current.removeEventListener('characteristicvaluechanged', handleNotify); } catch {}
      charRef.current = null;
    }
    if (device && device.gatt.connected) {
      try { device.gatt.disconnect(); } catch {}
    }
    setBleState("idle");
    setDevice(null);
  }, [device]);

  function handleNotify(event) {
    const rpm = parseRPM(event.target.value);
    if (rpm) {
      setLastRPM(rpm);
      setLaunches(prev => [{
        rpm,
        ts: Date.now(),
        comboLabel: isComplete(activeCombo) ? comboLabel(activeCombo) : "—"
      }, ...prev].slice(0, 50));
    }
  }

  async function connect() {
    if (!navigator.bluetooth) {
      setBleState("unsupported");
      return;
    }
    try {
      setBleState("scanning");
      setErrMsg("");
      const dev = await navigator.bluetooth.requestDevice({
        filters: [
          { name: "BEYBLADE_TOOL01" },
          { namePrefix: "BEY" },
          { services: [BP_SERVICE] }
        ],
        optionalServices: [BP_SERVICE]
      });
      setDevice(dev);
      dev.addEventListener('gattserverdisconnected', () => {
        setBleState("idle");
        setDevice(null);
        charRef.current = null;
      });
      setBleState("connecting");
      const server  = await dev.gatt.connect();
      const service = await server.getPrimaryService(BP_SERVICE);
      const char    = await service.getCharacteristic(BP_DATA_CHAR);
      charRef.current = char;
      await char.startNotifications();
      char.addEventListener('characteristicvaluechanged', handleNotify);
      setBleState("connected");
    } catch (e) {
      setBleState("error");
      if (e.name === "NotFoundError") setErrMsg("Nessun dispositivo selezionato.");
      else if (e.name === "SecurityError") setErrMsg("Permesso Bluetooth negato.");
      else setErrMsg(e.message || "Errore connessione.");
    }
  }

  const rating = rpmRating(lastRPM);
  const avgRPM = launches.length
    ? Math.round(launches.slice(0,10).reduce((a,l) => a+l.rpm, 0) / Math.min(launches.length,10))
    : null;

  const statusDot = { idle:"#555", scanning:"#f59e0b", connecting:"#f59e0b", connected:"#22c55e", error:"#ef4444", unsupported:"#ef4444" }[bleState] || "#555";
  const statusLabel = { idle:"Disconnesso", scanning:"Scansione in corso…", connecting:"Connessione…", connected:"Connesso ✓", error:"Errore", unsupported:"BLE non supportato" }[bleState];

  return (
    <div style={{padding:'0 0 24px'}}>

      {/* HEADER CARD */}
      <div style={{background:'linear-gradient(135deg,#0d1b2a,#0a1628)',border:'1px solid #1a2a3a',
                   borderRadius:14,padding:'20px 16px',marginBottom:14,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-20,right:-20,fontSize:80,opacity:0.04,userSelect:'none'}}>📡</div>
        <div style={{fontSize:9,fontWeight:800,letterSpacing:'2px',color:'#00b4ff',marginBottom:6}}>BEYLOGGER3 — BEYBLADE_TOOL01</div>
        <div style={{fontSize:18,fontWeight:900,color:'#e8f4fd',marginBottom:12}}>BattlePass</div>

        {/* Status */}
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:16}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:statusDot,
            boxShadow:bleState==='connected'?`0 0 8px ${statusDot}`:'none',display:'inline-block'}}/>
          <span style={{fontSize:11,color:'var(--text-secondary)',fontWeight:600}}>{statusLabel}</span>
        </div>

        {/* Combo attiva selector */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:9,fontWeight:800,color:'var(--text-ghost)',letterSpacing:'1px',marginBottom:6}}>COMBO ATTIVA</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            <button onClick={()=>setActiveComboSrc("tracker")} style={{
              background:activeComboSrc==="tracker"?`${acColor}20`:'var(--bg-btn-ghost)',
              border:`1px solid ${activeComboSrc==="tracker"?acColor:'var(--border-btn)'}`,
              color:activeComboSrc==="tracker"?acColor:'var(--text-dimmer)',
              borderRadius:6,padding:'4px 10px',fontSize:10,fontWeight:700,cursor:'pointer'
            }}>⚔ Tracker</button>
            {(decks||[]).map(dk => (
              <button key={dk.id} onClick={()=>setActiveComboSrc(String(dk.id))} style={{
                background:activeComboSrc===String(dk.id)?`${acColor}20`:'var(--bg-btn-ghost)',
                border:`1px solid ${activeComboSrc===String(dk.id)?acColor:'var(--border-btn)'}`,
                color:activeComboSrc===String(dk.id)?acColor:'var(--text-dimmer)',
                borderRadius:6,padding:'4px 10px',fontSize:10,fontWeight:700,cursor:'pointer'
              }}>🃏 {dk.name}</button>
            ))}
          </div>
          <div style={{fontSize:12,fontWeight:800,color:acColor,
            background:`${acColor}10`,border:`1px solid ${acColor}30`,
            borderRadius:7,padding:'6px 10px'}}>
            {comboName}
          </div>
        </div>

        {/* Connect / Disconnect button */}
        {bleState === "connected" ? (
          <button onClick={disconnect} style={{
            width:'100%',padding:'12px',borderRadius:10,cursor:'pointer',fontWeight:800,fontSize:13,
            background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.4)',color:'#ef4444'
          }}>⏏ Disconnetti</button>
        ) : (
          <button onClick={connect} disabled={bleState==="scanning"||bleState==="connecting"} style={{
            width:'100%',padding:'12px',borderRadius:10,cursor:bleState==="scanning"||bleState==="connecting"?'wait':'pointer',
            fontWeight:800,fontSize:13,opacity:bleState==="scanning"||bleState==="connecting"?0.6:1,
            background:'linear-gradient(135deg,#0066cc,#0044aa)',border:'1px solid #0088ff',color:'#fff'
          }}>
            {bleState==="scanning"||bleState==="connecting" ? "⏳ Connessione…" : "📡 Connetti BattlePass"}
          </button>
        )}
        {errMsg && <div style={{fontSize:10,color:'#ef4444',marginTop:8,textAlign:'center'}}>{errMsg}</div>}
        {bleState==="unsupported" && (
          <div style={{fontSize:10,color:'#f59e0b',marginTop:8,textAlign:'center'}}>
            Web Bluetooth non supportato. Usa Chrome o Edge su Android/PC.
          </div>
        )}
      </div>

      {/* HOW TO guide */}
      {bleState !== "connected" && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border-card)',
                     borderRadius:12,padding:'14px 14px',marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:800,color:'var(--text-ghost)',letterSpacing:'1px',marginBottom:10}}>COME USARE</div>
          {[
            ["1","Seleziona la combo attiva (Tracker o Deck) qui sopra."],
            ["2","Tieni premuto il tasto del BattlePass finché il LED lampeggia → modalità sync attiva."],
            ["3","Premi \"Connetti BattlePass\" nell'app → seleziona BEYBLADE_TOOL01 dal popup."],
            ["4","Una volta connesso, lancia il tuo Bey. Gli RPM vengono letti automaticamente."],
          ].map(([n,txt])=>(
            <div key={n} style={{display:'flex',gap:10,marginBottom:8,alignItems:'flex-start'}}>
              <span style={{minWidth:20,height:20,background:'#00b4ff20',border:'1px solid #00b4ff40',
                color:'#00b4ff',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:9,fontWeight:900,flexShrink:0}}>{n}</span>
              <span style={{fontSize:11,color:'var(--text-secondary)',lineHeight:1.5}}>{txt}</span>
            </div>
          ))}
          <div style={{fontSize:10,color:'var(--text-ultra)',marginTop:4,padding:'8px',

            ⚠️ Il BattlePass fa advertising solo per pochi secondi dopo aver premuto il tasto — connettiti dall'app rapidamente dopo aver attivato il sync.
          </div>

      {/* RPM DISPLAY — solo se connesso o con dati */}

                     borderRadius:12,padding:'20px 16px',marginBottom:14,textAlign:'center'}}>
          <div style={{fontSize:9,fontWeight:800,color:'var(--text-ghost)',letterSpacing:'2px',marginBottom:8}}>ULTIMO LANCIO</div>
          <div style={{fontSize:52,fontWeight:900,color:acColor,lineHeight:1,marginBottom:4,
            textShadow:`0 0 30px ${acColor}60`}}>
            {lastRPM ? lastRPM.toLocaleString() : "—"}
          </div>
          <div style={{fontSize:13,color:'var(--text-ghost)',marginBottom:12}}>RPM</div>
          <div style={{display:'inline-block',padding:'4px 14px',borderRadius:20,
            background:`${rating.color}18`,border:`1px solid ${rating.color}44`,
            color:rating.color,fontSize:12,fontWeight:700}}>{rating.label}</div>
          {avgRPM && (
            <div style={{marginTop:12,fontSize:11,color:'var(--text-dimmer)'}}>
              Media ultimi {Math.min(launches.length,10)} lanci: <strong style={{color:'var(--text-secondary)'}}>{avgRPM.toLocaleString()} RPM</strong>
            </div>
          )}
          {bleState==="connected" && (
            <div style={{marginTop:10,fontSize:10,color:'#22c55e',fontWeight:600}}>
              🟢 In ascolto — lancia il Bey per registrare
            </div>
          )}
        </div>
      )}

      {/* LAUNCH HISTORY */}
      {launches.length > 0 && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border-card)',borderRadius:12,padding:'14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:800,color:'var(--text-ghost)',letterSpacing:'1px'}}>STORICO LANCI</div>
            <button onClick={()=>setLaunches([])} style={{
              fontSize:9,color:'#ef4444',background:'rgba(239,68,68,0.08)',
              border:'1px solid rgba(239,68,68,0.2)',borderRadius:5,padding:'2px 8px',cursor:'pointer',fontWeight:700
            }}>Svuota</button>
          </div>
          {launches.map((l, i) => {
            const r = rpmRating(l.rpm);
            const dt = new Date(l.ts);
            const time = dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,
                padding:'8px 0',borderBottom:i<launches.length-1?'1px solid var(--border-card2)':'none'}}>
                <span style={{fontSize:9,color:'var(--text-ultra)',minWidth:22,textAlign:'center',
                  fontWeight:800,color:i===0?acColor:'var(--text-ultra)'}}>{i===0?'▶':i+1}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--text-card)',fontWeight:800,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.comboLabel}</div>
                  <div style={{fontSize:9,color:'var(--text-ultra)'}}>{time}</div>
                </div>
                <span style={{fontSize:13,fontWeight:900,color:r.color,minWidth:60,textAlign:'right'}}>
                  {l.rpm.toLocaleString()}
                </span>
                <span style={{fontSize:8,color:r.color,background:`${r.color}15`,
                  border:`1px solid ${r.color}33`,borderRadius:4,padding:'1px 5px',
                  fontWeight:700,minWidth:52,textAlign:'center'}}>{r.label}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── APP ───────────────────────────────────────────────────── */
function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } })();
  const [s, d] = useReducer(reducer, saved || INIT_STATE);
  const [theme, setTheme]     = useState(() => localStorage.getItem('beytrackerx_theme') || 'dark');
  const [logOppId, setLogOppId] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('beytrackerx_theme', theme);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme==='light' ? '#f0f2f7' : '#090a0e';
  }, [theme]);

  const toggleTheme = () => setTheme(p => p==='dark' ? 'light' : 'dark');
  const logOpp = logOppId ? (s.opponents||[]).find(o => o.id===logOppId) : null;

  // Applica un preset meta alla "tua combo"
  const applyPreset = (p) => {
    d({type:"MY",f:"system",  v:p.system});
    d({type:"MY",f:"blade",   v:p.blade});
    d({type:"MY",f:"ratchet", v:p.ratchet});
    d({type:"MY",f:"bit",     v:p.bit});
    d({type:"MY",f:"lockChip",   v:""});
    d({type:"MY",f:"mainBlade",  v:""});
    d({type:"MY",f:"assistBlade",v:""});
  };

  return (
    <div className="app">

      {/* HEADER */}
      <header className="header">
        <div className="flex-center">
          <div className="logo-spin">⚡</div>
          <div className="logo-text">BEY<span style={{color:"#00b4ff"}}>TRACKER</span> X</div>
        </div>
        <nav className="nav">
          {BNAV_TABS.map(t => (
            <button key={t.v} onClick={() => d({type:"VIEW",v:t.v})}
              className={`nav-btn ${s.view===t.v?'active':'inactive'}`}>{t.label}</button>
          ))}
        </nav>
        <button onClick={toggleTheme} className="theme-toggle-btn">
          {theme==='dark'?'☀️':'🌙'}
        </button>
      </header>

      {/* DESKTOP SHELL */}
      <div className="desktop-shell">
        <aside className="sidebar">
          {BNAV_TABS.map(t => (
            <button key={t.v} onClick={() => d({type:"VIEW",v:t.v})}
              className={`sidebar-btn ${s.view===t.v?'active':'inactive'}`}>
              <span className="sidebar-icon">{t.icon}</span> {t.label}
            </button>
          ))}
        </aside>

        <main className="desktop-main">
          <div className="content">

            {/* TRACKER */}
            {s.view==="tracker" && (
              <>
                <div className="my-combo-card">
                  <div className="card-header">
                    <div className="card-accent-bar"/>
                    <span className="card-title">La Tua Combo</span>
                    {isComplete(s.myCombo) && <span className="ready-badge">✓ Pronta</span>}
                  </div>
                  <ComboForm combo={s.myCombo} onChange={(f,v) => d({type:"MY",f,v})}
                    showStats={isComplete(s.myCombo)}
                    showPresets={true}
                    onPresetApply={applyPreset}/>
                </div>
                <div className="section-header">
                  <span className="section-title">Avversari</span>
                  <button className="add-btn" onClick={() => d({type:"ADD_OPP"})}>+ Vuoto</button>
                </div>
                <MetaOppPicker onAdd={p => d({type:"ADD_OPP_META", preset:p})}/>
                {(s.opponents||[]).map(opp => (
                  <div key={opp.id} className="opp-card" style={{border:'1px solid var(--border-card2)'}}>
                    <div className="opp-body">
                      <div className="opp-top">
                        <span className="opp-label-name">{comboLabel(opp)}</span>
                        <button className="del-btn" onClick={() => d({type:"DEL_OPP",id:opp.id})}>×</button>
                      </div>
                      <ComboForm combo={opp} onChange={(f,v) => d({type:"OPP",id:opp.id,f,v})}/>
                      <div className="opp-actions">
                        <button
                          className={`register-btn ${isComplete(s.myCombo)&&isComplete(opp)?'enabled':'disabled'}`}
                          onClick={() => isComplete(s.myCombo)&&isComplete(opp)&&setLogOppId(opp.id)}>
                          ⚔ Log
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}

            {/* DECK */}
            {s.view==="deck" && (
              <DeckView decks={s.decks||[]} dispatch={d}/>
            )}

            {/* STATS */}
            {s.view==="stats" && (
              <StatsView myRecords={s.myRecords||[]} onDelRecord={label => d({type:"DEL_RECORD",label})}/>
            )}

            {/* BITS */}
            {s.view==="bits" && <BitsView/>}

            {/* BATTLEPASS */}
            {s.view==="bp" && (
              <BattlePassView myCombo={s.myCombo} decks={s.decks||[]}/>
            )}

            {/* BACKUP */}
            {s.view==="backup" && (
              <div className="backup-page">
                <div className="backup-card">
                  <div className="backup-card-title">📤 Esporta dati</div>
                  <div className="backup-card-desc">Scarica un file JSON con tutte le tue combo e partite.</div>
                  <button className="backup-btn export" onClick={() => {
                    const blob=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});
                    const a=document.createElement('a');
                    a.href=URL.createObjectURL(blob);
                    a.download=`beytrackerx_backup_${Date.now()}.json`;
                    a.click();
                  }}>⬇ Esporta JSON</button>
                </div>
                <div className="backup-card">
                  <div className="backup-card-title">📥 Importa dati</div>
                  <div className="backup-card-desc">Carica un backup JSON precedentemente esportato.</div>
                  <input type="file" accept=".json" className="file-input-hidden" id="import-file"
                    onChange={e => {
                      const f=e.target.files[0]; if(!f) return;
                      const r=new FileReader();
                      r.onload=ev=>{ try{ d({type:"RESTORE",data:JSON.parse(ev.target.result)}); }catch{} };
                      r.readAsText(f);
                    }}/>
                  <button className="backup-btn import" onClick={()=>document.getElementById('import-file').click()}>
                    ⬆ Importa JSON
                  </button>
                </div>
                <div className="backup-card">
                  <div className="backup-card-title">⚠️ Reset</div>
                  <div className="backup-card-desc">Cancella tutti i dati e ricomincia da zero.</div>
                  <button className="backup-btn danger"
                    onClick={()=>{ if(confirm('Sei sicuro? Tutti i dati verranno eliminati.')) d({type:"FACTORY_RESET"}); }}>
                    🗑 Factory Reset
                  </button>
                </div>
              </div>
            )}

          </div>
        </main>
      </div>

      {/* BOTTOM NAV — solo navigazione, niente toggle tema */}
      <nav className="bottom-nav">
        {BNAV_TABS.map(t => (
          <button key={t.v} onClick={() => d({type:"VIEW",v:t.v})}
            className={`bottom-nav-btn ${s.view===t.v?'active':'inactive'}`}>
            <span className="bnav-icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>

      {/* LOG MODAL */}
      {logOpp && (
        <LogModal
          myCombo={s.myCombo} opp={logOpp}
          onLog={(r,finish) => d({type:"LOG",oppId:logOppId,r,finish})}
          onClose={() => setLogOppId(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
</script>
</body>
</html>
